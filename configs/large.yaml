# Large config: d=2048, 3+8+3 layers — 3-node Trillium pod
# Start on 3 nodes, prune to 27%, compact to 1 node
model:
  d_model: 2048
  n_heads: 16
  d_ff: 8192
  n_layers: 14
  n_prelude: 3
  n_core: 8
  n_coda: 3
  vocab_size: 50257
  max_seq_len: 1024
  mean_depth: 8
  max_depth: 32
  use_poisson: true
  init_decay: 0.447
  tile_size: 16
  macro_tile_size: 128
  tie_weights: true
  dropout: 0.0

training:
  lr: 3e-4
  weight_decay: 0.1
  warmup_steps: 2000
  total_steps: 100000
  batch_size: 64
  grad_clip: 1.0

pruning:
  prune_start: 0
  prune_end: 60000
  prune_frac: 0.10
  prune_interval: 4000
  score_interval: 10
  topology_interval: 100

routing:
  n_clusters: 32
  route_target_sparsity: 0.5
  route_warmup: 8000
  route_l1_weight: 0.01
