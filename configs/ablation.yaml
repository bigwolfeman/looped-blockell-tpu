# Ablation: 3p+6c+3coda looped, d=512, 63M params, 15k steps (~2.5h on 5090)
# 4:8:4 OOMs at batch 20. 3:6:3 gives 35k tok/s — 30% better throughput.

model:
  d_model: 512
  n_heads: 8
  d_ff: 2048
  n_layers: 12
  n_prelude: 3
  n_core: 6
  n_coda: 3
  vocab_size: 49152
  max_seq_len: 1024
  mean_depth: 6
  max_depth: 8
  use_poisson: true
  init_decay: 0.447
  tile_size: 16
  macro_tile_size: 128
  tie_weights: true

  # Ablation toggles (override per experiment)
  use_outer_ssm: false
  outer_state_detach: true
  outer_init_decay: 0.447
  embed_geometry: euclidean      # euclidean | lorentz | hybrid
  lorentz_dim_fraction: 0.5
  use_sparse_attention: false
  sparse_attn_top_k: 256
  sparse_attn_block_size: 32
  sparse_attn_n_indexer_heads: 4

training:
  lr: 0.0006
  weight_decay: 0.1
  warmup_steps: 500
  total_steps: 15000
  batch_size: 20
  grad_clip: 1.0
