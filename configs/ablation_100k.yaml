# 100k-step ablation base: 3p+6c+3coda, d=512, hybrid embeddings
# ~67M params (63M backbone + ~6M memory MLP + ~0.8M projections)
# 100k * 20 * 1024 ≈ 2B tokens on FineWeb-Edu

model:
  d_model: 512
  n_heads: 8
  d_ff: 2048
  n_layers: 12
  n_prelude: 3
  n_core: 6
  n_coda: 3
  vocab_size: 49152
  max_seq_len: 1024
  mean_depth: 6
  max_depth: 8
  use_poisson: true
  init_decay: 0.447
  tie_weights: true
  embed_geometry: hybrid
  lorentz_dim_fraction: 0.5

  # Neural memory defaults (override per ablation)
  use_neural_memory: true
  n_memory_layers: 6
  d_memory: 1024
  memory_theta_lr: 0.01
  memory_inner_steps: 5
  memory_warmup_steps: 1000   # backbone-only for first 1k steps
  memory_ramp_steps: 4000     # linear ramp memory 0→1 over steps 1k-5k
  memory_alpha_min: 0.0001
  memory_alpha_max: 0.003
  memory_surprise_scale: 3.0
  memory_eta_fixed: 0.95
  use_sigreg: false
  sigreg_lambda: 0.02
  use_differentiable_memory: false

training:
  lr: 0.0006
  weight_decay: 0.1
  warmup_steps: 2000
  total_steps: 100000
  batch_size: 20
  grad_clip: 1.0
