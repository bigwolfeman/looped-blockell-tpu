# Medium: 2 TPU nodes → 1 after compact, batch=32
# ~400M params, 3+6+3 layers, effective depth 54
model:
  d_model: 1536
  n_heads: 16
  d_ff: 6144
  n_layers: 12
  n_prelude: 3
  n_core: 6
  n_coda: 3
  vocab_size: 49152  # StarCoder2
  max_seq_len: 1024
  mean_depth: 8
  max_depth: 32
  use_poisson: true
  init_decay: 0.447
  tile_size: 16
  macro_tile_size: 128
  tie_weights: true
  dropout: 0.0

training:
  lr: 3e-4
  weight_decay: 0.1
  warmup_steps: 2000
  total_steps: 85000
  batch_size: 32
  grad_clip: 1.0

pruning:
  prune_start: 0
  prune_end: 60000
  prune_frac: 0.10
  prune_interval: 4600
  score_interval: 10
  topology_interval: 100

routing:
  n_clusters: 16
  route_target_sparsity: 0.5
  route_warmup: 5000
  route_l1_weight: 0.01
